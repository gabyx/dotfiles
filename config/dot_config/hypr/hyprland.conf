# #######################################################################################
# hyprland main configuration
#
# this file sources other configuration files to keep everything organized.
# for a full list of options, see the hyprland wiki: https://wiki.hyprland.org/
# #######################################################################################

source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/keybindings.conf

source = ~/.config/hypr/visuals.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/windowrules.conf

source = ~/.config/hypr/startup.conf

# include your private or work-specific overrides at the end.
# this allows them to override any settings from the files above.
# you can create these files and put monitor-specific workspace assignments in them.
# source = ~/.config/hypr/config-private.conf
# source = ~/.config/hypr/config-work.conf the order can be important.
